<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phish or Legit? – Phishing Awareness Game</title>
    <style>
        /* --- Reset & Global --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0b1a2f;
            color: #e0f0ff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- Layout --- */
        .app {
            width: 100%;
            max-width: 520px;
            background: #122b44;
            border-radius: 2rem;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #1a3a5c;
            padding: 1.5rem 1.5rem 1rem;
            text-align: center;
        }
        .header h1 {
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }
        .header .sub {
            font-size: 0.95rem;
            opacity: 0.8;
            margin-top: 0.25rem;
        }

        .progress-area {
            padding: 0.5rem 1.5rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }
        .progress-status {
            background: rgba(79, 195, 247, 0.1);
            border: 1px solid rgba(79, 195, 247, 0.3);
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: #4fc3f7;
            text-align: center;
            margin: 0.5rem 1.5rem 0.5rem;
        }
        .progress-bar-bg {
            flex: 1;
            height: 6px;
            background: #1e4d74;
            border-radius: 3px;
            margin-left: 0.75rem;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: #4fc3f7;
            transition: width 0.3s;
            border-radius: 3px;
        }

        .help-text {
            padding: 0.25rem 1.5rem 0;
            font-size: 0.85rem;
            opacity: 0.85;
            text-align: center;
        }

        .email-card {
            margin: 1.5rem;
            padding: 1.5rem;
            background: #f0f6fc;
            color: #1e2a38;
            border-radius: 1.5rem;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            min-height: 220px;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .email-card .field {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
        }
        .label {
            font-weight: 600;
            color: #1a3a5c;
            min-width: 60px;
        }
        .value {
            word-break: break-word;
        }
        .email-body {
            margin-top: 0.5rem;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .actions {
            display: flex;
            gap: 1rem;
            padding: 0 1.5rem 1.5rem;
        }
        .btn {
            flex: 1;
            padding: 1rem 0.5rem;
            border: none;
            border-radius: 1.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            min-height: 48px;
            touch-action: manipulation;
        }
        .btn:hover:not(:disabled) {
            filter: brightness(1.08);
        }
        .btn:focus-visible {
            outline: 3px solid #fff3b0;
            outline-offset: 3px;
            box-shadow: 0 0 0 4px rgba(255, 243, 176, 0.35);
        }
        .btn:active { transform: scale(0.97); }
        .btn-phish {
            background: #b71c1c;
            color: white;
        }
        .btn-legit {
            background: #1b5e20;
            color: white;
        }
        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* --- Feedback Overlay --- */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.82);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 1rem;
        }
        .overlay.hidden { display: none; }
        .overlay:not(.hidden)::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            pointer-events: auto;
        }
        .overlay-card {
            background: #0f253d;
            border-radius: 2rem;
            padding: 2rem;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            animation: pop 0.25s ease;
            pointer-events: auto;
        }
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes pulse-success {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .result-icon.completed {
            animation: pulse-success 0.6s ease-out;
        }
        .result-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .red-flags {
            text-align: left;
            background: #1e2a38;
            border-radius: 1rem;
            padding: 1rem;
            margin: 1rem 0;
            list-style: none;
        }
        .red-flags li {
            padding: 0.4rem 0;
            border-bottom: 1px solid #334;
            display: flex;
            gap: 0.5rem;
        }
        .red-flags li:last-child { border-bottom: none; }
        .tip-box {
            font-style: italic;
            background: #1a3a5c;
            border-radius: 0.8rem;
            padding: 0.8rem;
            margin-top: 0.5rem;
        }

        .overlay .btn {
            background: #90caf9;
            color: #0b1a2f;
            margin-top: 1rem;
        }

        /* --- Summary Screen --- */
        .summary {
            text-align: center;
            padding: 2rem 1.5rem;
        }
        .summary h2 { font-size: 2rem; }
        .summary .score {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 1rem 0;
            color: #4fc3f7;
        }
        .summary .btn {
            background: #4fc3f7;
            color: #0b1a2f;
            width: auto;
            padding: 0.8rem 2rem;
            margin: 0.5rem auto;
            display: inline-flex;
        }

        #summary-screen {
            overflow-y: auto;
            max-height: 100vh;
        }

        .hidden { display: none !important; }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        .difficulty-bar {
            display: flex;
            gap: 0.25rem;
            justify-content: center;
            margin: 0.75rem 0;
        }
        .difficulty-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
        }
        .difficulty-dot.filled {
            background: #ff9100;
        }
        .difficulty-label {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 0.25rem;
        }

        .explanation-box, .action-box {
            text-align: left;
            background: rgba(144, 202, 249, 0.08);
            border-left: 3px solid #90caf9;
            border-radius: 0.5rem;
            padding: 0.8rem;
            margin: 0.75rem 0;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .explanation-box strong, .action-box strong {
            color: #90caf9;
        }
        .action-box {
            background: rgba(76, 175, 80, 0.08);
            border-left-color: #4caf50;
        }
        .action-box strong {
            color: #4caf50;
        }

        .results-breakdown {
            background: #1e2a38;
            border-radius: 1rem;
            padding: 1rem;
            margin: 1rem 0;
            text-align: left;
        }
        .results-breakdown h4 {
            font-size: 0.9rem;
            color: #90caf9;
            margin-bottom: 0.75rem;
            text-align: center;
        }
        .result-item {
            padding: 0.5rem;
            margin: 0.25rem 0;
            background: rgba(79, 195, 247, 0.05);
            border-radius: 0.5rem;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .result-item.correct {
            border-left: 3px solid #4caf50;
        }
        .result-item.incorrect {
            border-left: 3px solid #ff9100;
        }
        .result-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 0.4rem;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .result-badge.correct {
            background: #4caf50;
            color: white;
        }
        .result-badge.incorrect {
            background: #ff9100;
            color: white;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
            .overlay-card {
                animation: none;
            }
            .progress-bar-fill {
                transition: none;
            }
        }

        @media (max-width: 700px) {
            body {
                padding: 0.5rem;
                align-items: stretch;
            }

            .app {
                max-width: 100%;
                min-height: calc(100vh - 1rem);
                border-radius: 1.25rem;
            }

            .header {
                padding: 1.25rem 1rem 0.9rem;
            }

            .header h1 {
                font-size: 1.55rem;
            }

            .progress-area {
                padding: 0.5rem 1rem 0;
                gap: 0.75rem;
                flex-wrap: wrap;
            }

            .progress-bar-bg {
                margin-left: 0;
                width: 100%;
                order: 2;
            }

            .progress-status {
                margin: 0.5rem 1rem;
                font-size: 0.82rem;
                padding: 0.45rem 0.8rem;
            }

            .help-text {
                padding: 0.25rem 1rem 0;
                font-size: 0.8rem;
            }

            .email-card {
                margin: 1rem;
                padding: 1rem;
                min-height: 200px;
            }

            .actions {
                flex-direction: column;
                gap: 0.75rem;
                padding: 0 1rem 1rem;
            }

            .btn {
                width: 100%;
                font-size: 1rem;
                padding: 0.95rem 0.75rem;
            }

            .overlay {
                padding: 0.5rem;
            }

            .overlay-card {
                max-width: 100%;
                padding: 1.25rem;
                border-radius: 1.25rem;
            }

            .result-icon {
                font-size: 2.4rem;
            }

            .summary {
                padding: 1.5rem 1rem;
            }

            .summary h2 {
                font-size: 1.7rem;
            }

            .summary .score {
                font-size: 2.8rem;
            }

            .difficulty-label {
                font-size: 0.7rem;
            }

            .results-breakdown {
                padding: 0.85rem;
            }

            .result-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.45rem;
            }

            .result-badge {
                align-self: flex-end;
            }
        }

        @media (max-width: 420px) {
            .header .sub {
                font-size: 0.85rem;
            }

            .email-card {
                margin: 0.75rem;
                min-height: 180px;
            }

            .label {
                min-width: 52px;
                font-size: 0.92rem;
            }

            .email-body {
                font-size: 0.92rem;
            }

            .overlay-card {
                padding: 1rem;
            }

            .difficulty-bar {
                margin: 0.5rem 0;
            }

            .explanation-box,
            .action-box,
            .tip-box {
                margin: 0.6rem 0;
                padding: 0.7rem;
                font-size: 0.9rem;
            }

            .summary .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- Start Screen -->
        <div id="start-screen">
            <div class="header">
                <h1>🎣 Phish or Legit?</h1>
                <p class="sub">Can you spot a phishing email?<br>Learn to protect yourself in 2 minutes.</p>
            </div>
            <div style="padding: 1.5rem; text-align: center;">
                <button class="btn" style="background:#4fc3f7; color:#0b1a2f; width: auto; padding: 1rem 2rem; font-size:1.3rem;" id="start-btn">Start Game</button>
            </div>
        </div>

        <!-- Game Screen (hidden initially) -->
        <div id="game-screen" class="hidden">
            <div class="header">
                <h1>📧 Inbox</h1>
            </div>
            <div class="progress-area">
                <span id="progress-text">1 / 6</span>
                <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
            </div>
            <div class="progress-status" id="progress-status">Round 1 of 6</div>
            <p class="help-text" id="keyboard-help">Keyboard shortcuts: ← Phish • → Legit</p>
            <div class="email-card" id="email-card">
                <div class="field"><span class="label">From:</span><span class="value" id="email-from"></span></div>
                <div class="field"><span class="label">Subject:</span><span class="value" id="email-subject"></span></div>
                <div class="email-body" id="email-body"></div>
            </div>
            <div class="actions">
                <button class="btn btn-phish" id="btn-phish" aria-keyshortcuts="ArrowLeft A 1">⚠️ Phish</button>
                <button class="btn btn-legit" id="btn-legit" aria-keyshortcuts="ArrowRight L 2">✅ Legit</button>
            </div>
        </div>

        <!-- Summary Screen (hidden until end) -->
        <div id="summary-screen" class="hidden summary">
            <h2>Game Over</h2>
            <p id="summary-message"></p>
            <div class="score" id="final-score"></div>
            <button class="btn" id="replay-btn">🔄 Play Again</button>
        </div>

        <!-- Feedback Overlay -->
        <div class="overlay hidden" id="feedback-overlay" role="dialog" aria-modal="true" aria-labelledby="result-title" aria-describedby="feedback-announcer tip-text" aria-hidden="true">
            <div class="overlay-card" tabindex="-1">
                <div id="feedback-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>
                <div class="result-icon" id="result-icon" role="img" aria-label="Result"></div>
                <h3 id="result-title"></h3>
                <div class="difficulty-bar" id="difficulty-bar"></div>
                <div class="difficulty-label" id="difficulty-label"></div>
                <div class="explanation-box"><strong>Why?</strong> <span id="explanation-text"></span></div>
                <ul class="red-flags" id="red-flags-list"></ul>
                <div class="tip-box" id="tip-text"></div>
                <div class="results-breakdown hidden" id="correct-answer-info"></div>
                <div class="action-box"><strong>💡 What to do:</strong> <span id="action-text"></span></div>
                <button class="btn" id="next-btn">Next →</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // --- Scenario Data ---
            const scenarios = [
                {
                    id: 1,
                    from: "PayPal Security <security@paypal.com.security-checks.com>",
                    subject: "Unusual sign-in activity on your account",
                    body: "We detected a login from a new device in Montreal, Canada. Review activity to keep your account secure:\nhttps://paypal.com.security-checks.com/login",
                    correctAnswer: "phish",
                    difficulty: 2,
                    explanation: "This one is more realistic because the sender name looks legitimate and the domain contains paypal.com at first glance. The real registered domain is security-checks.com, not paypal.com.",
                    action: "When you get a security alert, do not use the link in the email. Open the service manually in your browser or app and check recent activity there.",
                    redFlags: [
                        "🔍 Display name imitates PayPal support",
                        "🌐 Registered domain is security-checks.com, not paypal.com",
                        "🔗 The link is a lookalike domain rather than paypal.com"
                    ],
                    tip: "Look beyond the display name. Check the full domain carefully and navigate to the site yourself when in doubt."
                },
                {
                    id: 2,
                    from: "noreply@amazon.com",
                    subject: "Your order #112-3456789 has shipped",
                    body: "Hello, your parcel is on its way! Track it here: https://amazon.com/your-orders\nEstimated delivery: April 28, 2026.",
                    correctAnswer: "legit",
                    difficulty: 1,
                    explanation: "This is legitimate because it uses the correct domain (amazon.com), contains an order number you might have, and asks no sensitive information. The tracking URL points to an official Amazon page.",
                    action: "You can safely click tracking links from official companies for notifications you expect. When in doubt, log in directly to your account.",
                    redFlags: [],
                    tip: "This looks genuine: the sender uses the official domain, there's no urgency or request for personal info. Always check the URL before clicking."
                },
                {
                    id: 3,
                    from: "Microsoft Account Team <account-security@microsoft-verify.com>",
                    subject: "You've been signed out from one of your devices",
                    body: "We noticed sign-in activity from a Windows PC in another city. If this wasn't you, verify your account within 12 hours:\nhttps://microsoft-verify.com/security",
                    correctAnswer: "phish",
                    difficulty: 3,
                    explanation: "This example avoids obvious typos and uses a believable account-security story. The domain looks close to Microsoft, but the real domain is microsoft-verify.com rather than microsoft.com.",
                    action: "Always open Microsoft directly through the official website or app, then review recent sign-ins from there.",
                    redFlags: [
                        "🔍 Sender name mimics Microsoft Account Team",
                        "🌐 Domain is microsoft-verify.com, not microsoft.com",
                        "⏳ The 12-hour deadline adds pressure"
                    ],
                    tip: "Security alerts can look convincing. Check the sender domain and verify account activity from the official app or website."
                },
                {
                    id: 4,
                    from: "irs@tax-refund.gov",
                    subject: "You are eligible for a tax refund",
                    body: "Our records show you overpaid taxes. Click below to claim your refund of $850 within 48 hours.\nhttps://tax-refund.gov/claim?id=8821",
                    correctAnswer: "phish",
                    difficulty: 2,
                    explanation: "Tax agencies never initiate contact via email about refunds. This uses financial incentive (money owed to you) to lower your guard. Real IRS uses irs.gov, not tax-refund.gov.",
                    action: "Check your tax status on irs.gov directly. If you owe a refund, the IRS will notify you by mail with an official form.",
                    redFlags: [
                        "🏛️ IRS uses irs.gov, not tax-refund.gov",
                        "💸 Promise of money is a common lure",
                        "⏰ 48-hour deadline to rush you"
                    ],
                    tip: "Government agencies won't email you asking for sensitive information. Visit official sites directly."
                },
                {
                    id: 5,
                    from: "dhl-delivery@dhl-service.com",
                    subject: "Parcel held – pay customs fee",
                    body: "Your package is waiting. Pay the $2.99 customs fee now to release it.\nhttp://dhl-service.com/pay?track=XE8821",
                    correctAnswer: "phish",
                    difficulty: 3,
                    explanation: "This is tricky because a small fee ($2.99) seems harmless, and many people do receive customs notices. But DHL always uses @dhl.com, and won't ask you to pay via email links.",
                    action: "For package issues, check the carrier's website directly using their official app or website. Never pay through links in emails.",
                    redFlags: [
                        "📦 Sender domain mimics DHL (dhl-service.com)",
                        "💰 Small fee seems harmless but steals card details",
                        "🔗 Unofficial payment link"
                    ],
                    tip: "Check shipping notifications directly on the courier's official website, never pay through a link."
                },
                {
                    id: 6,
                    from: "LinkedIn Security <security@linkedin.com>",
                    subject: "New sign-in detected",
                    body: "We noticed a sign-in from Safari on macOS. If this wasn't you, review your recent activity in LinkedIn:\nhttps://linkedin.com/security",
                    correctAnswer: "legit",
                    difficulty: 1,
                    explanation: "This is technically safe because it uses the official linkedin.com domain and points to a LinkedIn page. It still feels suspicious because it is security-related, so the safest habit is to confirm it by logging in directly.",
                    action: "Open LinkedIn yourself rather than clicking the link if the message makes you uneasy. That way you can confirm the sign-in alert from the official site.",
                    redFlags: [],
                    tip: "A real security alert can still feel alarming. When the domain is official, verify the alert from the app or website before taking action."
                },
                {
                    id: 7,
                    from: "HR Team <hr@company-portal.com>",
                    subject: "Updated PTO policy – acknowledgment required",
                    body: "Hi team,\n\nWe've updated the PTO policy for 2026. Please review and acknowledge by end of day.\nOpen document: https://company-portal.com/hr/pto-policy\n\nThanks,\nHR Operations",
                    correctAnswer: "phish",
                    difficulty: 3,
                    explanation: "This looks internal and uses a reasonable subject line. The domain is not your actual corporate domain and the urgency (end of day) pressures fast action.",
                    action: "If you receive internal policy updates, access them through your official HR portal or intranet. Verify via a known internal channel.",
                    redFlags: [
                        "🏷️ Looks internal but uses an unfamiliar domain",
                        "⏳ Same-day deadline adds pressure",
                        "🔗 Link goes to a non-corporate site"
                    ],
                    tip: "Internal lures are common. Always verify the sender domain and use your company's official portal."
                },
                {
                    id: 8,
                    from: "Billing <billing@northwind-invoices.com>",
                    subject: "Invoice #78124 – payment reminder",
                    body: "Hello,\n\nThis is a friendly reminder that invoice #78124 is past due. Please remit payment to avoid service interruption.\nView invoice: https://northwind-invoices.com/78124\n\nThank you,\nNorthwind Billing",
                    correctAnswer: "phish",
                    difficulty: 3,
                    explanation: "Invoice lures are subtle because they feel routine. The domain is plausible but not the known vendor domain, and the message pushes quick payment action.",
                    action: "Verify invoices through your normal vendor portal or accounting system. Never pay based solely on an emailed link.",
                    redFlags: [
                        "🧾 Domain looks plausible but isn’t a known vendor domain",
                        "💸 Payment urgency without prior context",
                        "🔗 Invoice link leads off the usual portal"
                    ],
                    tip: "Invoice scams rely on routine behavior. Always verify vendor domains and use your regular payment workflow."
                }
            ];

            // --- Game State ---
            const TOTAL_ROUNDS = scenarios.length; // Use all 6 for demo
            let currentRound = 0;
            let score = 0;
            let shuffled = [];
            let roundResults = [];

            // DOM elements
            const startScreen = document.getElementById('start-screen');
            const gameScreen = document.getElementById('game-screen');
            const summaryScreen = document.getElementById('summary-screen');
            const feedbackOverlay = document.getElementById('feedback-overlay');
            const startBtn = document.getElementById('start-btn');
            const btnPhish = document.getElementById('btn-phish');
            const btnLegit = document.getElementById('btn-legit');
            const nextBtn = document.getElementById('next-btn');
            const replayBtn = document.getElementById('replay-btn');
            const progressText = document.getElementById('progress-text');
            const progressFill = document.getElementById('progress-fill');
            const progressStatus = document.getElementById('progress-status');
            const emailFrom = document.getElementById('email-from');
            const emailSubject = document.getElementById('email-subject');
            const emailBody = document.getElementById('email-body');
            const resultIcon = document.getElementById('result-icon');
            const resultTitle = document.getElementById('result-title');
            const redFlagsList = document.getElementById('red-flags-list');
            const tipText = document.getElementById('tip-text');
            const feedbackAnnouncer = document.getElementById('feedback-announcer');
            const finalScore = document.getElementById('final-score');
            const summaryMessage = document.getElementById('summary-message');

            // --- Functions ---
            function shuffleArray(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            function showScreen(screen) {
                startScreen.classList.add('hidden');
                gameScreen.classList.add('hidden');
                summaryScreen.classList.add('hidden');
                screen.classList.remove('hidden');
            }

            function showFeedback() {
                feedbackOverlay.classList.remove('hidden');
                feedbackOverlay.setAttribute('aria-hidden', 'false');
                nextBtn.focus();
            }

            function hideFeedback() {
                feedbackOverlay.classList.add('hidden');
                feedbackOverlay.setAttribute('aria-hidden', 'true');
            }

            function updateProgress() {
                progressText.textContent = `${currentRound + 1} / ${TOTAL_ROUNDS}`;
                const percent = ((currentRound + 1) / TOTAL_ROUNDS) * 100;
                progressFill.style.width = percent + '%';
                progressStatus.textContent = `Round ${currentRound + 1} of ${TOTAL_ROUNDS}`;
            }

            function loadScenario(index) {
                const s = shuffled[index];
                emailFrom.textContent = s.from;
                emailSubject.textContent = s.subject;
                emailBody.textContent = s.body;
                updateProgress();
                // Enable buttons
                btnPhish.disabled = false;
                btnLegit.disabled = false;
                btnPhish.focus();
            }


            function renderDifficultyBar(difficulty) {
                const bar = document.getElementById('difficulty-bar');
                const label = document.getElementById('difficulty-label');
                bar.innerHTML = '';
                for (let i = 1; i <= 3; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'difficulty-dot';
                    if (i <= difficulty) {
                        dot.classList.add('filled');
                    }
                    bar.appendChild(dot);
                }
                const diffLabels = ['Easy', 'Medium', 'Tricky'];
                label.textContent = diffLabels[Math.min(difficulty - 1, 2)] + ' Email';
            }

            function handleAnswer(userAnswer) {
                const scenario = shuffled[currentRound];
                const isCorrect = (userAnswer === scenario.correctAnswer);
                if (isCorrect) score++;

                // Track this round's result
                roundResults.push({
                    round: currentRound + 1,
                    scenario: scenario,
                    userAnswer: userAnswer,
                    isCorrect: isCorrect
                });

                // Disable buttons to prevent double-click
                btnPhish.disabled = true;
                btnLegit.disabled = true;

                // Prepare feedback
                if (scenario.correctAnswer === 'phish') {
                    resultIcon.textContent = isCorrect ? '🎉' : '😬';
                    resultTitle.textContent = isCorrect ? 'Correct! That was a phishing email.' : 'Oops! That was actually a phishing email.';
                } else {
                    resultIcon.textContent = isCorrect ? '🎉' : '😬';
                    resultTitle.textContent = isCorrect ? 'Correct! That was a legitimate email.' : 'Oops! That email was actually safe.';
                }

                // Add completion animation
                resultIcon.classList.add('completed');

                // Render difficulty indicator
                renderDifficultyBar(scenario.difficulty || 2);

                // Show explanation
                document.getElementById('explanation-text').textContent = scenario.explanation || 'Pay attention to the sender, links, and urgency tactics.';

                // Show correct answer info if they got it wrong
                const correctAnswerInfo = document.getElementById('correct-answer-info');
                if (!isCorrect) {
                    const correctLabel = scenario.correctAnswer === 'phish' ? '⚠️ Phish' : '✅ Legit';
                    correctAnswerInfo.innerHTML = `<h4>Correct Answer</h4><span>${correctLabel}</span>`;
                    correctAnswerInfo.classList.remove('hidden');
                } else {
                    correctAnswerInfo.classList.add('hidden');
                }

                // Show red flags (if any)
                redFlagsList.innerHTML = '';
                if (scenario.redFlags.length > 0) {
                    scenario.redFlags.forEach(flag => {
                        const li = document.createElement('li');
                        li.textContent = flag;
                        redFlagsList.appendChild(li);
                    });
                } else {
                    const li = document.createElement('li');
                    li.textContent = '✅ No obvious red flags found.';
                    redFlagsList.appendChild(li);
                }

                // Show tip
                tipText.textContent = '💡 ' + scenario.tip;

                // Show recommended action
                document.getElementById('action-text').textContent = scenario.action || 'When in doubt, verify through official channels.';

                // Update screen reader announcement
                feedbackAnnouncer.textContent = `${resultTitle.textContent} Difficulty: ${scenario.difficulty || 2} out of 3. ${scenario.explanation} ${scenario.redFlags.length ? scenario.redFlags.join(' ') : 'No obvious red flags.'} ${scenario.action}`;
                showFeedback();
            }

            function nextRound() {
                hideFeedback();
                currentRound++;
                if (currentRound < TOTAL_ROUNDS) {
                    loadScenario(currentRound);
                } else {
                    showSummary();
                }
            }

            function showSummary() {
                showScreen(summaryScreen);
                finalScore.textContent = `${score} / ${TOTAL_ROUNDS}`;
                const pct = score / TOTAL_ROUNDS;
                if (pct === 1) {
                    summaryMessage.textContent = '🏆 Perfect! You are a phishing detective.';
                } else if (pct >= 0.7) {
                    summaryMessage.textContent = '👍 Great job! You spotted most scams.';
                } else if (pct >= 0.4) {
                    summaryMessage.textContent = '📘 Good start. Review the tips to sharpen your skills.';
                } else {
                    summaryMessage.textContent = '🛡️ Keep learning! Phishing scams are tricky, but practice makes you safer.';
                }

                // Build results breakdown
                const existingBreakdown = summaryScreen.querySelector('.results-breakdown');
                if (existingBreakdown) {
                    existingBreakdown.remove();
                }
                const breakdown = document.createElement('div');
                breakdown.className = 'results-breakdown';
                breakdown.innerHTML = '<h4>Results Breakdown</h4>';
                roundResults.forEach(result => {
                    const item = document.createElement('div');
                    item.className = `result-item ${result.isCorrect ? 'correct' : 'incorrect'}`;
                    const badge = document.createElement('span');
                    badge.className = `result-badge ${result.isCorrect ? 'correct' : 'incorrect'}`;
                    badge.textContent = result.isCorrect ? '✓ Correct' : '✗ Incorrect';
                    item.innerHTML = `<span>Round ${result.round}: ${result.isCorrect ? '✓' : '✗'}</span>`;
                    item.appendChild(badge);
                    breakdown.appendChild(item);
                });
                summaryScreen.insertBefore(breakdown, replayBtn);

                replayBtn.focus();
            }

            function startGame() {
                shuffled = shuffleArray(scenarios);
                currentRound = 0;
                score = 0;
                roundResults = [];
                showScreen(gameScreen);
                loadScenario(0);
            }

            function handleKeyboardShortcuts(event) {
                const key = event.key.toLowerCase();
                // Prevent any keyboard action when feedback overlay is open
                if (!feedbackOverlay.classList.contains('hidden')) {
                    return;
                }

                if (!gameScreen.classList.contains('hidden')) {
                    if (key === 'arrowleft' || key === 'a' || key === '1') {
                        event.preventDefault();
                        btnPhish.click();
                    } else if (key === 'arrowright' || key === 'l' || key === '2') {
                        event.preventDefault();
                        btnLegit.click();
                    }
                }
            }

            // Prevent closing overlay by clicking the background
            feedbackOverlay.addEventListener('click', function(e) {
                if (e.target === feedbackOverlay) {
                    e.preventDefault();
                    e.stopPropagation();
                    // Silently ignore - don't close the overlay
                    return false;
                }
            });

            // --- Event Listeners ---
            startBtn.addEventListener('click', startGame);
            btnPhish.addEventListener('click', () => handleAnswer('phish'));
            btnLegit.addEventListener('click', () => handleAnswer('legit'));
            nextBtn.addEventListener('click', nextRound);
            replayBtn.addEventListener('click', startGame); // Replay goes directly to game
            document.addEventListener('keydown', handleKeyboardShortcuts);

            // Start on start screen
            showScreen(startScreen);
            startBtn.focus();
        })();
    </script>
</body>
</html>
